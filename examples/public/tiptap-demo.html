<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TipTap + Spindel Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .tiptap-demo {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .demo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .demo-header h1 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin: 0;
        }

        .editor-section {
            margin-bottom: 30px;
        }

        .editor-section h2 {
            margin: 0 0 15px 0;
            color: #444;
            font-size: 1.2em;
        }

        /* TipTap editor container styles */
        .tiptap-editor {
            border: 2px solid #ddd;
            border-radius: 8px;
            min-height: 200px;
            padding: 15px;
            background: #fafafa;
        }

        .tiptap-editor:focus-within {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        /* ProseMirror content styles */
        .tiptap-editor .ProseMirror {
            outline: none;
            min-height: 150px;
        }

        .tiptap-editor .ProseMirror p {
            margin: 0 0 1em 0;
        }

        .tiptap-editor .ProseMirror p:last-child {
            margin-bottom: 0;
        }

        .tiptap-editor .ProseMirror strong {
            font-weight: 600;
        }

        .tiptap-editor .ProseMirror em {
            font-style: italic;
        }

        .tiptap-editor .ProseMirror h1,
        .tiptap-editor .ProseMirror h2,
        .tiptap-editor .ProseMirror h3 {
            margin: 1em 0 0.5em 0;
            line-height: 1.3;
        }

        .tiptap-editor .ProseMirror ul,
        .tiptap-editor .ProseMirror ol {
            padding-left: 1.5em;
        }

        .tiptap-editor .ProseMirror code {
            background: #e9ecef;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .tiptap-editor .ProseMirror pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 1em;
            border-radius: 6px;
            overflow-x: auto;
        }

        .tiptap-editor .ProseMirror blockquote {
            border-left: 3px solid #ddd;
            padding-left: 1em;
            margin-left: 0;
            color: #666;
        }

        .preview-section {
            margin-bottom: 20px;
        }

        .preview-section h2 {
            margin: 0 0 15px 0;
            color: #444;
            font-size: 1.2em;
        }

        .content-preview {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85em;
            max-height: 200px;
            overflow-y: auto;
        }

        .content-preview code {
            font-family: 'Fira Code', 'Monaco', monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .stats-section {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
        }

        .stats-section h3 {
            margin: 0 0 10px 0;
            font-size: 1em;
            color: #666;
        }

        .stats-section p {
            margin: 0;
            color: #333;
        }

        /* Keyboard shortcuts hint */
        .keyboard-hints {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4fd;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .keyboard-hints h4 {
            margin: 0 0 10px 0;
            color: #0066cc;
        }

        .keyboard-hints ul {
            margin: 0;
            padding-left: 1.5em;
        }

        .keyboard-hints li {
            margin: 5px 0;
        }

        .keyboard-hints kbd {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #ccc;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div id="app">
        <p>Loading TipTap demo...</p>
    </div>

    <div class="keyboard-hints">
        <h4>Keyboard Shortcuts (StarterKit)</h4>
        <ul>
            <li><kbd>Ctrl+B</kbd> / <kbd>Cmd+B</kbd> - Bold</li>
            <li><kbd>Ctrl+I</kbd> / <kbd>Cmd+I</kbd> - Italic</li>
            <li><kbd>Ctrl+Shift+1-6</kbd> - Headings</li>
            <li><kbd>Ctrl+Shift+8</kbd> - Bullet list</li>
            <li><kbd>Ctrl+Shift+9</kbd> - Ordered list</li>
            <li><kbd>Ctrl+Shift+B</kbd> - Blockquote</li>
            <li><kbd>Ctrl+Z</kbd> / <kbd>Cmd+Z</kbd> - Undo</li>
            <li><kbd>Ctrl+Shift+Z</kbd> / <kbd>Cmd+Shift+Z</kbd> - Redo</li>
        </ul>
    </div>

    <script src="/js/shared.js"></script>
    <script src="/js/tiptap-demo.js"></script>
    <script>
        examples.tiptap_demo.init();
    </script>
</body>
</html>
